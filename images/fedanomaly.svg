<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="160" height="160" fill="url(#bg)" rx="8"/>
  <!-- Central server node -->
  <circle cx="80" cy="65" r="14" fill="none" stroke="#4ecca3" stroke-width="2"/>
  <circle cx="80" cy="65" r="6" fill="#4ecca3" opacity="0.6"/>
  <!-- Client nodes -->
  <circle cx="35" cy="35" r="8" fill="none" stroke="#e94560" stroke-width="1.5"/>
  <circle cx="35" cy="35" r="3" fill="#e94560" opacity="0.6"/>
  <circle cx="125" cy="35" r="8" fill="none" stroke="#4ecca3" stroke-width="1.5"/>
  <circle cx="125" cy="35" r="3" fill="#4ecca3" opacity="0.6"/>
  <circle cx="35" cy="100" r="8" fill="none" stroke="#4ecca3" stroke-width="1.5"/>
  <circle cx="35" cy="100" r="3" fill="#4ecca3" opacity="0.6"/>
  <circle cx="125" cy="100" r="8" fill="none" stroke="#4ecca3" stroke-width="1.5"/>
  <circle cx="125" cy="100" r="3" fill="#4ecca3" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="43" y1="40" x2="67" y2="58" stroke="#e94560" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="117" y1="40" x2="93" y2="58" stroke="#4ecca3" stroke-width="1" opacity="0.4"/>
  <line x1="43" y1="95" x2="67" y2="72" stroke="#4ecca3" stroke-width="1" opacity="0.4"/>
  <line x1="117" y1="95" x2="93" y2="72" stroke="#4ecca3" stroke-width="1" opacity="0.4"/>
  <!-- Shield icon on server -->
  <path d="M80 56 L87 60 L87 68 L80 73 L73 68 L73 60 Z" fill="none" stroke="#f0c040" stroke-width="1.5"/>
  <!-- Anomaly warning on red node -->
  <text x="35" y="22" text-anchor="middle" font-size="10" fill="#e94560" font-weight="bold">!</text>
  <!-- Label -->
  <text x="80" y="130" text-anchor="middle" font-size="9" fill="#aaa" font-family="sans-serif">Federated Anomaly</text>
  <text x="80" y="142" text-anchor="middle" font-size="9" fill="#aaa" font-family="sans-serif">Detection</text>
</svg>