<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#302b63;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="160" height="160" fill="url(#bg2)" rx="8"/>
  <!-- ViT patch grid -->
  <g transform="translate(20, 18)">
    <rect x="0" y="0" width="24" height="24" fill="#e74c3c" opacity="0.4" rx="2"/>
    <rect x="26" y="0" width="24" height="24" fill="#3498db" opacity="0.4" rx="2"/>
    <rect x="52" y="0" width="24" height="24" fill="#e74c3c" opacity="0.3" rx="2"/>
    <rect x="0" y="26" width="24" height="24" fill="#2ecc71" opacity="0.4" rx="2"/>
    <rect x="26" y="26" width="24" height="24" fill="#f39c12" opacity="0.5" rx="2"/>
    <rect x="52" y="26" width="24" height="24" fill="#2ecc71" opacity="0.3" rx="2"/>
    <rect x="0" y="52" width="24" height="24" fill="#3498db" opacity="0.3" rx="2"/>
    <rect x="26" y="52" width="24" height="24" fill="#e74c3c" opacity="0.3" rx="2"/>
    <rect x="52" y="52" width="24" height="24" fill="#f39c12" opacity="0.4" rx="2"/>
  </g>
  <!-- Arrow -->
  <line x1="102" y1="48" x2="118" y2="48" stroke="#aaa" stroke-width="1.5"/>
  <polygon points="118,44 126,48 118,52" fill="#aaa"/>
  <!-- Transformer block -->
  <rect x="128" y="30" width="20" height="36" fill="none" stroke="#9b59b6" stroke-width="1.5" rx="3"/>
  <line x1="132" y1="40" x2="144" y2="40" stroke="#9b59b6" stroke-width="1" opacity="0.6"/>
  <line x1="132" y1="48" x2="144" y2="48" stroke="#9b59b6" stroke-width="1" opacity="0.6"/>
  <line x1="132" y1="56" x2="144" y2="56" stroke="#9b59b6" stroke-width="1" opacity="0.6"/>
  <!-- Attention lines from patches to transformer -->
  <line x1="96" y1="30" x2="128" y2="38" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>
  <line x1="96" y1="48" x2="128" y2="48" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>
  <line x1="96" y1="66" x2="128" y2="58" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>
  <!-- VS text -->
  <text x="50" y="105" text-anchor="middle" font-size="10" fill="#e74c3c" font-family="sans-serif" font-weight="bold">CNN</text>
  <text x="80" y="105" text-anchor="middle" font-size="10" fill="#aaa" font-family="sans-serif">vs</text>
  <text x="115" y="105" text-anchor="middle" font-size="10" fill="#9b59b6" font-family="sans-serif" font-weight="bold">ViT</text>
  <!-- Label -->
  <text x="80" y="128" text-anchor="middle" font-size="9" fill="#aaa" font-family="sans-serif">Vision Transformers</text>
  <text x="80" y="140" text-anchor="middle" font-size="9" fill="#aaa" font-family="sans-serif">Kidney Stone Classification</text>
</svg>